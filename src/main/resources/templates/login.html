<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login &mdash; Manajemen Mahasiswa</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<style>
    :root{
        --ink:#16213D;
        --ink-2:#0F1626;
        --paper:#F5F3ED;
        --card:#FFFFFF;
        --gold:#C69A3B;
        --gold-deep:#A87F28;
        --forest:#3D5C46;
        --clay:#A34638;
        --clay-tint:#F3E3E0;
        --slate:#5B6472;
        --line:#E4E0D5;
    }
    *{ box-sizing:border-box; }

    html, body{ height:100%; }
    body{
        background:
            radial-gradient(1100px 550px at 85% -10%, rgba(198,154,59,0.10), transparent 60%),
            radial-gradient(900px 500px at 5% 110%, rgba(61,92,70,0.08), transparent 55%),
            var(--paper);
        font-family:'Inter', -apple-system, sans-serif;
        color:var(--ink-2);
    }

    @media (prefers-reduced-motion: reduce){
        *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
    }

    .h-100{ min-height:100vh; }

    .brand-block{ text-align:center; }
    .brand-seal{
        width:56px; height:56px;
        margin:0 auto 14px;
        border-radius:50%;
        border:1.5px solid var(--gold);
        display:flex; align-items:center; justify-content:center;
        color:var(--gold);
        font-family:'Fraunces', serif;
        font-weight:600;
        font-size:21px;
        background:rgba(198,154,59,0.08);
        box-shadow:0 8px 20px -8px rgba(198,154,59,0.35);
    }
    .brand-block h1{
        font-family:'Fraunces', serif;
        font-weight:600;
        font-size:26px;
        color:var(--ink-2);
        margin-bottom:4px;
    }
    .brand-block p{
        font-size:13px;
        color:var(--slate);
        letter-spacing:0.02em;
    }

    .auth-card{
        border:1px solid var(--line);
        border-radius:14px;
        overflow:hidden;
        box-shadow:0 30px 60px -24px rgba(15,22,38,0.28);
        animation:riseIn .5s ease both;
    }
    @keyframes riseIn{
        from{ opacity:0; transform:translateY(14px); }
        to{ opacity:1; transform:translateY(0); }
    }

    .tab-switch{
        display:flex;
        background:var(--ink);
        border-bottom:3px solid var(--gold);
    }
    .tab-switch button{
        flex:1;
        border:none;
        background:transparent;
        color:#9AA3B2;
        font-weight:600;
        font-size:13.5px;
        letter-spacing:0.03em;
        padding:16px 10px;
        transition:color .15s ease, background .15s ease;
    }
    .tab-switch button.active{
        color:var(--gold);
        background:rgba(198,154,59,0.10);
    }
    .tab-switch button:focus{ outline:none; }

    .card-body{ background:#FFFEFB; padding:38px 40px !important; }

    .form-group label{
        font-size:11.5px;
        font-weight:600;
        text-transform:uppercase;
        letter-spacing:0.06em;
        color:var(--slate);
        margin-bottom:6px;
    }
    .form-control{
        border:1px solid var(--line);
        border-radius:8px;
        padding:11px 13px;
        font-size:14.5px;
        height:auto;
    }
    .form-control:focus{
        border-color:var(--gold);
        box-shadow:0 0 0 3px rgba(198,154,59,0.15);
    }
    .input-group-text{
        background:#fff;
        border:1px solid var(--line);
        border-left:none;
        color:var(--slate);
        cursor:pointer;
    }
    .input-group-text:hover{ color:var(--gold-deep); }

    .btn-gold{
        background:var(--gold);
        border:1px solid var(--gold-deep);
        color:#241A05;
        font-weight:700;
        font-size:14.5px;
        padding:12px;
        border-radius:8px;
        box-shadow:0 3px 0 var(--gold-deep);
        transition:transform .12s ease, background .12s ease;
    }
    .btn-gold:hover{ background:#D4A845; color:#241A05; transform:translateY(-1px); }
    .btn-gold:active{ transform:translateY(1px); box-shadow:0 1px 0 var(--gold-deep); }

    .divider{
        display:flex; align-items:center; gap:12px;
        margin:22px 0 16px;
        color:var(--slate);
        font-size:11.5px;
        text-transform:uppercase;
        letter-spacing:0.08em;
    }
    .divider::before, .divider::after{
        content:'';
        flex:1;
        height:1px;
        background:var(--line);
    }

    .btn-guest{
        background:#fff;
        border:1px solid var(--line);
        color:var(--ink-2);
        font-weight:600;
        font-size:14px;
        padding:11px;
        border-radius:8px;
        display:flex; align-items:center; justify-content:center; gap:8px;
        transition:all .15s ease;
    }
    .btn-guest:hover{
        border-color:var(--forest);
        color:var(--forest);
        background:#F5F8F5;
    }

    #loginError, #registerError{
        background:var(--clay-tint);
        border:1px solid rgba(163,70,56,0.25);
        color:var(--clay);
        font-size:13px;
        padding:10px 14px;
        border-radius:8px;
    }

    .footer-note{
        color:var(--slate);
        font-size:12px;
        letter-spacing:0.02em;
    }

    .panel{ display:none; }
    .panel.active{ display:block; animation:fadeIn .25s ease both; }
    @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
</style>
</head>
<body>
<section class="h-100">
<div class="container h-100">
<div class="row justify-content-sm-center align-items-center h-100">
<div class="col-lg-5">

    <div class="brand-block my-4">
        <div class="brand-seal">M</div>
        <h1>Manajemen Mahasiswa</h1>
        <p>Portal administrasi data mahasiswa</p>
    </div>

    <div class="card auth-card" th:attr="data-register-error=${registerError != null}">
        <div class="tab-switch">
            <button type="button" id="tabLoginBtn" class="active" onclick="switchTab('login')">MASUK</button>
            <button type="button" id="tabRegisterBtn" onclick="switchTab('register')">DAFTAR</button>
        </div>

        <div class="card-body">

            <!-- Panel: Login -->
            <div id="panelLogin" class="panel active">
                <form method="POST" th:action="@{/login}" class="needs-validation" novalidate autocomplete="off" id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Masukkan password" required>
                            <div class="input-group-append">
                                <span class="input-group-text" id="toggle-password">
                                    <i class="fas fa-eye" id="toggle-password-icon"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-gold btn-block mt-3">Masuk</button>
                    </div>
                </form>

                <div id="loginError" class="mt-3" th:if="${param.error}" style="display: block;">
                    <i class="fas fa-circle-exclamation mr-1"></i> Username atau password salah
                </div>

                <div class="divider">atau</div>

                <button type="button" class="btn btn-guest btn-block" onclick="window.location.href='/guest-login'">
                    <i class="fas fa-user-clock"></i> Coba sebagai Tamu
                </button>
            </div>

            <!-- Panel: Register -->
            <div id="panelRegister" class="panel">
                <form method="POST" th:action="@{/register}" class="needs-validation" novalidate autocomplete="off" id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" class="form-control" id="regUsername" name="username" placeholder="Pilih username" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="regPassword" name="password" placeholder="Buat password" required minlength="6">
                            <div class="input-group-append">
                                <span class="input-group-text" id="toggle-reg-password">
                                    <i class="fas fa-eye" id="toggle-reg-password-icon"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Konfirmasi Password</label>
                        <input type="password" class="form-control" id="regConfirmPassword" name="confirmPassword" placeholder="Ulangi password" required minlength="6">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-gold btn-block mt-3">Buat Akun</button>
                    </div>
                </form>

                <div id="registerError" class="mt-3" th:if="${registerError}" style="display:block;">
                    <i class="fas fa-circle-exclamation mr-1"></i> <span th:text="${registerError}">Password tidak cocok</span>
                </div>

                <div id="registerHint" class="mt-3 footer-note text-center">
                    Sudah punya akun? <a href="javascript:void(0)" onclick="switchTab('login')" style="color:var(--gold-deep); font-weight:600;">Masuk di sini</a>
                </div>
            </div>

        </div>
    </div>

    <div class="text-center mt-3" th:if="${param.registered}">
        <span style="color:var(--forest); font-size:13px; font-weight:600;">
            <i class="fas fa-circle-check mr-1"></i> Akun berhasil dibuat, silakan masuk.
        </span>
    </div>

    <div class="text-center mt-4 footer-note">
        Copyright &copy; 2024 &mdash; Manajemen Mahasiswa
    </div>

</div>
</div>
</div>
</section>

<script>
    function switchTab(tab) {
        const isLogin = tab === 'login';
        $('#panelLogin').toggleClass('active', isLogin);
        $('#panelRegister').toggleClass('active', !isLogin);
        $('#tabLoginBtn').toggleClass('active', isLogin);
        $('#tabRegisterBtn').toggleClass('active', !isLogin);
    }

    function wirePasswordToggle(inputId, iconId, toggleId) {
        document.getElementById(toggleId).addEventListener('click', function () {
            const passwordInput = document.getElementById(inputId);
            const passwordIcon = document.getElementById(iconId);
            const isPasswordVisible = passwordInput.type === 'text';
            passwordInput.type = isPasswordVisible ? 'password' : 'text';
            passwordIcon.classList.toggle('fa-eye');
            passwordIcon.classList.toggle('fa-eye-slash');
        });
    }

    wirePasswordToggle('password', 'toggle-password-icon', 'toggle-password');
    wirePasswordToggle('regPassword', 'toggle-reg-password-icon', 'toggle-reg-password');

    // Validasi konfirmasi password sebelum submit form register
    document.getElementById('registerForm').addEventListener('submit', function (e) {
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        const errorBox = document.getElementById('registerError');
        if (pass !== confirm) {
            e.preventDefault();
            document.getElementById('registerErrorText').textContent = 'Password dan konfirmasi password tidak cocok';
            errorBox.style.display = 'block';
        } else {
            errorBox.style.display = 'none';
        }
    });

    // Jika ada parameter error, buka tab login dan bersihkan URL
    window.addEventListener('load', function() {
        const url = new URL(window.location);
        if (url.searchParams.has('error')) {
            switchTab('login');
            url.searchParams.delete('error');
            window.history.replaceState({}, document.title, url);
        }
        if (url.searchParams.has('registered')) {
            switchTab('login');
        }
        if ($('.auth-card').data('register-error') === true) {
            switchTab('register');
        }
    });
</script>
</body>
</html>
